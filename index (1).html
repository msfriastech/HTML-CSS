<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebCraft — Student HTML & CSS Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --panel: #16161d;
      --border: #2a2a38;
      --accent: #f0c040;
      --accent2: #60d0a0;
      --accent3: #e06080;
      --text: #e8e8f0;
      --muted: #7070a0;
      --tab-active: #1e1e2e;
      --radius: 8px;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--accent);
      white-space: nowrap;
    }
    .logo span { color: var(--text); font-weight: 400; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    button {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      padding: 7px 14px;
      transition: all 0.15s;
    }

    .btn-run {
      background: var(--accent);
      color: #0f0f13;
    }
    .btn-run:hover { background: #f5d060; transform: translateY(-1px); }
    .btn-run:active { transform: translateY(0); }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { color: var(--text); border-color: var(--muted); }

    .btn-download {
      background: var(--accent2);
      color: #0f0f13;
    }
    .btn-download:hover { background: #80e0b0; transform: translateY(-1px); }

    .btn-fullscreen {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 7px 10px;
      font-size: 1rem;
    }
    .btn-fullscreen:hover { color: var(--text); border-color: var(--muted); }

    /* ── MAIN LAYOUT ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── EDITOR PANE ── */
    .editor-pane {
      width: 48%;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      border-right: 2px solid var(--border);
      flex-shrink: 0;
      resize: horizontal;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active-html { color: var(--accent); border-bottom-color: var(--accent); background: var(--tab-active); }
    .tab.active-css  { color: var(--accent2); border-bottom-color: var(--accent2); background: var(--tab-active); }

    .editor-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .code-wrap {
      display: none;
      height: 100%;
      position: relative;
    }
    .code-wrap.visible { display: flex; }

    .line-numbers {
      padding: 16px 12px 16px 8px;
      background: var(--bg);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 1.65;
      text-align: right;
      user-select: none;
      min-width: 42px;
      overflow: hidden;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: var(--tab-active);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.65;
      padding: 16px 16px 16px 12px;
      border: none;
      outline: none;
      resize: none;
      tab-size: 2;
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
      overflow-y: auto;
      caret-color: var(--accent);
    }
    textarea::selection { background: rgba(240,192,64,0.25); }
    textarea:focus { background: #1a1a28; }

    /* ── PREVIEW PANE ── */
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    .preview-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .traffic-lights { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: var(--accent3); }
    .dot-y { background: var(--accent); }
    .dot-g { background: var(--accent2); }

    iframe {
      flex: 1;
      border: none;
      background: #fff;
    }

    /* ── STATUS BAR ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 20px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
      flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2);
      display: inline-block;
    }
    .status-sep { color: var(--border); }

    /* ── TIPS PANEL ── */
    .tips {
      padding: 10px 16px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .tips strong { color: var(--accent); }
    .tips kbd {
      background: var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 0.68rem;
    }

    /* ── FULLSCREEN PREVIEW ── */
    .fullscreen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #fff;
      flex-direction: column;
    }
    .fullscreen-overlay.active { display: flex; }
    .fullscreen-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--panel);
    }
    .fullscreen-bar span { font-size: 0.8rem; color: var(--muted); font-family: var(--mono); }
    .fullscreen-bar button { background: var(--accent3); color: #fff; }
    .fullscreen-iframe { flex: 1; border: none; background: #fff; }

    /* ── SCROLLBAR ── */
    textarea::-webkit-scrollbar { width: 6px; height: 6px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    textarea::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">WebCraft <span>// student editor</span></div>
  <div class="header-actions">
    <button class="btn-reset" id="btnReset">↺ Reset</button>
    <button class="btn-download" id="btnDownload">↓ Download</button>
    <button class="btn-run" id="btnRun">▶ Run</button>
    <button class="btn-fullscreen" id="btnFullscreen" title="Preview fullscreen">⛶</button>
  </div>
</header>

<!-- MAIN -->
<div class="workspace">

  <!-- EDITOR -->
  <div class="editor-pane">
    <div class="tabs">
      <div class="tab active-html" data-tab="html">HTML</div>
      <div class="tab" data-tab="css">CSS</div>
    </div>
    <div class="editor-area">
      <!-- HTML editor -->
      <div class="code-wrap visible" id="wrap-html">
        <div class="line-numbers" id="ln-html">1</div>
        <textarea id="editor-html" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <!-- CSS editor -->
      <div class="code-wrap" id="wrap-css">
        <div class="line-numbers" id="ln-css">1</div>
        <textarea id="editor-css" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>
    <div class="tips">
      <strong>Tips:</strong>
      Press <kbd>▶ Run</kbd> to update preview &nbsp;·&nbsp;
      <kbd>Tab</kbd> inserts spaces &nbsp;·&nbsp;
      <kbd>↓ Download</kbd> saves your page as an HTML file
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-pane">
    <div class="preview-bar">
      <div class="traffic-lights">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="preview-label">Live Preview</div>
      <div></div>
    </div>
    <iframe id="preview" title="Preview"></iframe>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span><span class="status-dot"></span> Ready</span>
  <span class="status-sep">|</span>
  <span id="statusInfo">HTML · CSS</span>
  <span class="status-sep">|</span>
  <span>WebCraft Student Editor — Free & No Login Required</span>
</div>

<!-- FULLSCREEN OVERLAY -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <div class="fullscreen-bar">
    <span>⛶ Fullscreen Preview</span>
    <button onclick="closeFullscreen()">✕ Close</button>
  </div>
  <iframe class="fullscreen-iframe" id="fullscreenIframe" title="Fullscreen Preview"></iframe>
</div>

<script>
// ── DEFAULT STARTER CODE ──
const DEFAULT_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My First Website</title>
</head>
<body>

  <h1>Hello, World! 👋</h1>
  <p>Welcome to my website. I built this with HTML and CSS!</p>

  <h2>About Me</h2>
  <p>My name is <strong>Your Name</strong> and I am learning to code.</p>

  <ul>
    <li>I love learning</li>
    <li>HTML is fun</li>
    <li>CSS makes things pretty</li>
  </ul>

  <img src="https://placecats.com/300/200" alt="A cute cat" />

</body>
</html>`;

const DEFAULT_CSS = `/* ── Your CSS goes here! ── */

body {
  font-family: Arial, sans-serif;
  background-color: #f0f8ff;
  color: #333;
  padding: 30px;
  max-width: 700px;
  margin: 0 auto;
}

h1 {
  color: #e05080;
}

h2 {
  color: #3060c0;
}

ul {
  background: white;
  border-left: 4px solid #e05080;
  padding: 12px 24px;
  border-radius: 6px;
}

img {
  border-radius: 12px;
  margin-top: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}`;

// ── ELEMENTS ──
const htmlEditor  = document.getElementById('editor-html');
const cssEditor   = document.getElementById('editor-css');
const preview     = document.getElementById('preview');
const statusInfo  = document.getElementById('statusInfo');

let activeTab = 'html';

// ── INIT ──
(function init() {
  const savedHTML = localStorage.getItem('wc_html');
  const savedCSS  = localStorage.getItem('wc_css');
  htmlEditor.value = savedHTML ?? DEFAULT_HTML;
  cssEditor.value  = savedCSS  ?? DEFAULT_CSS;
  updateLineNumbers('html');
  updateLineNumbers('css');
  runPreview();
})();

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
    document.querySelectorAll('.code-wrap').forEach(w => w.classList.remove('visible'));
    tab.classList.add(`active-${activeTab}`);
    document.getElementById(`wrap-${activeTab}`).classList.add('visible');
    document.getElementById(`editor-${activeTab}`).focus();
  });
});

// ── RUN ──
function runPreview() {
  const html = htmlEditor.value;
  const css  = cssEditor.value;
  // Inject CSS into <head> if present, else prepend a <style> block
  let output = html;
  if (css.trim()) {
    const styleTag = `<style>\n${css}\n</style>`;
    if (/<\/head>/i.test(output)) {
      output = output.replace(/<\/head>/i, `${styleTag}\n</head>`);
    } else {
      output = styleTag + '\n' + output;
    }
  }
  preview.srcdoc = output;
  localStorage.setItem('wc_html', html);
  localStorage.setItem('wc_css', css);
  updateStatus();
}

document.getElementById('btnRun').addEventListener('click', runPreview);

// Auto-run on Ctrl+Enter / Cmd+Enter
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runPreview(); }
});

// ── TAB KEY in textarea ──
[htmlEditor, cssEditor].forEach(ed => {
  ed.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ed.selectionStart, end = ed.selectionEnd;
      ed.value = ed.value.substring(0, s) + '  ' + ed.value.substring(end);
      ed.selectionStart = ed.selectionEnd = s + 2;
      updateLineNumbers(ed === htmlEditor ? 'html' : 'css');
    }
  });
  ed.addEventListener('input', () => {
    updateLineNumbers(ed === htmlEditor ? 'html' : 'css');
  });
  ed.addEventListener('scroll', () => {
    const ln = document.getElementById(`ln-${ed === htmlEditor ? 'html' : 'css'}`);
    ln.scrollTop = ed.scrollTop;
  });
});

// ── LINE NUMBERS ──
function updateLineNumbers(tab) {
  const ed = tab === 'html' ? htmlEditor : cssEditor;
  const ln = document.getElementById(`ln-${tab}`);
  const lines = ed.value.split('\n').length;
  ln.textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
}

// ── STATUS ──
function updateStatus() {
  const hLines = htmlEditor.value.split('\n').length;
  const cLines = cssEditor.value.split('\n').length;
  statusInfo.textContent = `HTML ${hLines} lines · CSS ${cLines} lines`;
}

// ── RESET ──
document.getElementById('btnReset').addEventListener('click', () => {
  if (confirm('Reset to the starter code? Your changes will be lost.')) {
    htmlEditor.value = DEFAULT_HTML;
    cssEditor.value  = DEFAULT_CSS;
    updateLineNumbers('html');
    updateLineNumbers('css');
    runPreview();
  }
});

// ── DOWNLOAD ──
document.getElementById('btnDownload').addEventListener('click', () => {
  const html = htmlEditor.value;
  const css  = cssEditor.value;
  let output = html;
  if (css.trim()) {
    const styleTag = `<style>\n${css}\n</style>`;
    if (/<\/head>/i.test(output)) {
      output = output.replace(/<\/head>/i, `${styleTag}\n</head>`);
    } else {
      output = styleTag + '\n' + output;
    }
  }
  const blob = new Blob([output], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-website.html';
  a.click();
});

// ── FULLSCREEN ──
document.getElementById('btnFullscreen').addEventListener('click', () => {
  runPreview();
  const html = htmlEditor.value;
  const css  = cssEditor.value;
  let output = html;
  if (css.trim()) {
    const styleTag = `<style>\n${css}\n</style>`;
    if (/<\/head>/i.test(output)) {
      output = output.replace(/<\/head>/i, `${styleTag}\n</head>`);
    } else {
      output = styleTag + '\n' + output;
    }
  }
  document.getElementById('fullscreenIframe').srcdoc = output;
  document.getElementById('fullscreenOverlay').classList.add('active');
});
function closeFullscreen() {
  document.getElementById('fullscreenOverlay').classList.remove('active');
}
</script>
</body>
</html>
